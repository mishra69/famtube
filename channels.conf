# FamTube Channel Configuration
# Format: channel_url | max_videos | format
# 
# max_videos: how many recent videos to keep per channel (default: 5)
# format: yt-dlp format string (default: best[ext=mp4])
#   - best[ext=mp4]            = best[ext=mp4] quality available
#   - best[ext=mp4][height<=720] = max 720p (saves space)
#   - best[ext=mp4][height<=480] = max 480p (saves more space)
#
# Examples:
# https://www.youtube.com/@ChannelName | 5 | best[ext=mp4]
# https://www.youtube.com/@ChannelName | 3 | best[ext=mp4][height<=720]
# https://www.youtube.com/@ChannelName        (uses defaults: 5, best[ext=mp4])

# https://www.youtube.com/@SomeChannel                              (all defaults: 5 videos, best mp4)
# https://www.youtube.com/@SomeChannel | 10                        (keep 10 videos, default format)
# https://www.youtube.com/@SomeChannel | 5 | best[height<=720][ext=mp4]  (cap at 720p)
# https://www.youtube.com/@SomeChannel | 3 | best[height<=480][ext=mp4]  (low quality, saves space)
